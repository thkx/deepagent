name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $GITHUB_BIN
          echo "$GITHUB_BIN"
        env:
          GITHUB_BIN: ${{ runner.tool_cache }}/bin
      - name: Run `go vet`
        run: go vet ./...
      - name: Run `go test`
        run: go test ./...

  jsonschema:
    name: Run tests with jsonschema tag
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Ensure jsonschema dependency
        run: |
          go get github.com/santhosh-tekuri/jsonschema/v5@v5.13.0
      - name: Run tests with jsonschema tag
        run: go test -tags=jsonschema ./...

  sandbox-smoke:
    name: Sandbox smoke tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Run sandbox smoke tests
        run: |
          go test ./tools/builtin -run TestSandboxExecuteRejects
